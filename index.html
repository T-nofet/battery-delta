<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Charge Pro</title>
    
    <!-- הגדרות להפיכת הדף לאפליקציית מסך בית (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d1117">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: #161b22;
            border: 2px solid #30363d;
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
            background-color: #21262d;
            color: #8b949e;
            transition: all 0.3s ease;
        }

        .status-badge.charging {
            background-color: rgba(35, 134, 54, 0.2);
            color: #3fb950;
            border: 1px solid #238636;
        }

        .current-charge {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 10px;
        }

        .delta-box {
            min-height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .delta-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #3fb950;
            display: none;
        }

        .delta-label {
            font-size: 0.85rem;
            color: #8b949e;
            margin-top: 2px;
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #30363d;
            display: none;
        }

        .stat-item {
            background-color: #21262d;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.1rem;
            font-weight: 600;
            color: #58a6ff;
        }

        .stat-lbl {
            font-size: 0.75rem;
            color: #8b949e;
            margin-top: 4px;
        }

        .info-text {
            font-size: 0.85rem;
            color: #8b949e;
            line-height: 1.4;
            margin-top: 20px;
            border-top: 1px solid #21262d;
            padding-top: 15px;
        }

        /* סגנון כפתור וטבלת היסטוריה */
        .history-btn {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 15px;
            width: 100%;
            transition: background 0.2s;
        }

        .history-btn:hover {
            background-color: #30363d;
        }

        .history-section {
            display: none;
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px solid #30363d;
            padding-top: 10px;
        }

        .history-table {
            width: 100%;
            font-size: 0.8rem;
            border-collapse: collapse;
            text-align: right;
        }

        .history-table th {
            color: #8b949e;
            padding-bottom: 5px;
            border-bottom: 1px solid #30363d;
        }

        .history-table td {
            padding: 6px 0;
            border-bottom: 1px solid #21262d;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="statusBadge" class="status-badge">ממתין לנתונים...</div>
        
        <div class="current-charge"><span id="currentPct">--</span>%</div>
        
        <div class="delta-box">
            <div id="deltaValue" class="delta-value">+0%</div>
            <div id="deltaLabel" class="delta-label">נוספו מאז החיבור</div>
        </div>

        <div id="statsGrid" class="stats-grid">
            <div class="stat-item">
                <div id="timerVal" class="stat-val">00:00</div>
                <div class="stat-lbl">זמן טעינה</div>
            </div>
            <div class="stat-item">
                <div id="rateVal" class="stat-val">0.00</div>
                <div class="stat-lbl">קצב (% לדקה)</div>
            </div>
        </div>

        <div class="info-text" id="infoText">
            חבר את המטען כדי להתחיל מדידה מלאה.
        </div>

        <!-- כפתור ואזור היסטוריה מוסתר -->
        <button class="history-btn" id="toggleHistoryBtn" onclick="toggleHistory()">📋 הצג היסטוריית טעינות</button>
        <div class="history-section" id="historySection">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>זמן</th>
                        <th>דלתא</th>
                        <th>משך</th>
                    </tr>
                </thead>
                <tbody id="historyRows">
                    <!-- שורות ההיסטוריה יוזרקו כאן -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let initialChargeLevel = null;
        let startTime = null;
        let timerInterval = null;
        let lastNotifiedDelta = 0; // מעקב אחרי התראות ה-10%

        // פונקציה להשמעת צליל ביפ דיגיטלי מובנה
        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // צליל גבוה ונקי
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // ווליום עדין
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15); // אורך הצליל: 150 מילישניות
            } catch (e) {
                console.log("Audio not allowed yet");
            }
        }

        // ניהול שמירה והצגה של היסטוריה ב-LocalStorage
        function saveChargeToHistory(delta, durationStr) {
            if (delta <= 0) return; // לא שומרים טעינות ריקות
            let history = JSON.parse(localStorage.getItem('chargeHistory')) || [];
            const now = new Date();
            const timeStr = now.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
            
            history.unshift({ time: timeStr, delta: `+${delta}%`, duration: durationStr });
            if (history.length > 20) history.pop(); // שומרים עד 20 רשומות אחרונות
            
            localStorage.setItem('chargeHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('chargeHistory')) || [];
            const tbody = document.getElementById('historyRows');
            if (history.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#8b949e;">אין טעינות מוקלטות עדיין</td></tr>`;
                return;
            }
            tbody.innerHTML = history.map(item => `
                <tr>
                    <td>${item.time}</td>
                    <td style="color:#3fb950; font-weight:bold;">${item.delta}</td>
                    <td>${item.duration}</td>
                </tr>
            `).join('');
        }

        function toggleHistory() {
            const section = document.getElementById('historySection');
            const btn = document.getElementById('toggleHistoryBtn');
            if (section.style.display === 'block') {
                section.style.display = 'none';
                btn.textContent = "📋 הצג היסטוריית טעינות";
            } else {
                section.style.display = 'block';
                btn.textContent = "❌ סגור היסטוריה";
                renderHistory();
            }
        }

        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                
                function updateTimer() {
                    if (!startTime) return;
                    const now = new Date();
                    const diffTime = Math.abs(now - startTime);
                    
                    const minutes = Math.floor(diffTime / 60000);
                    const seconds = Math.floor((diffTime % 60000) / 1000);
                    
                    const displayMins = minutes < 10 ? '0' + minutes : minutes;
                    const displaySecs = seconds < 10 ? '0' + seconds : seconds;
                    const durationStr = `${displayMins}:${displaySecs}`;
                    
                    document.getElementById('timerVal').textContent = durationStr;

                    const currentPct = Math.round(battery.level * 100);
                    const delta = currentPct - initialChargeLevel;
                    const totalMinutes = diffTime / 60000;

                    // חישוב קצב
                    if (totalMinutes > 0 && delta > 0) {
                        document.getElementById('rateVal').textContent = (delta / totalMinutes).toFixed(2);
                    } else {
                        document.getElementById('rateVal').textContent = "0.00";
                    }

                    // בדיקת התראת קול כל 10% דלתא
                    if (delta > 0 && delta % 10 === 0 && delta !== lastNotifiedDelta) {
                        playBeep();
                        lastNotifiedDelta = delta; // מונע השמעה חוזרת באותו אחוז
                    }
                }

                function updateUI() {
                    const currentPct = Math.round(battery.level * 100);
                    document.getElementById('currentPct').textContent = currentPct;

                    const badge = document.getElementById('statusBadge');
                    const deltaValue = document.getElementById('deltaValue');
                    const deltaLabel = document.getElementById('deltaLabel');
                    const statsGrid = document.getElementById('statsGrid');
                    const infoText = document.getElementById('infoText');

                    if (battery.charging) {
                        badge.textContent = "⚡ בטעינה";
                        badge.classList.add('charging');

                        if (initialChargeLevel === null) {
                            initialChargeLevel = currentPct;
                            startTime = new Date();
                            lastNotifiedDelta = 0;
                            timerInterval = setInterval(updateTimer, 1000);
                        }

                        const delta = currentPct - initialChargeLevel;
                        deltaValue.textContent = `+${delta}%`;
                        deltaValue.style.display = 'block';
                        deltaLabel.style.display = 'block';
                        statsGrid.style.display = 'grid';
                        infoText.innerHTML = `הטעינה החלה ב-<strong>${initialChargeLevel}%</strong>.`;
                    } else {
                        // ניתוק מטען - שומרים להיסטוריה לפני האיפוס
                        if (initialChargeLevel !== null) {
                            const finalDelta = currentPct - initialChargeLevel;
                            const finalDuration = document.getElementById('timerVal').textContent;
                            saveChargeToHistory(finalDelta, finalDuration);
                        }

                        badge.textContent = "🔋 לא מחובר";
                        badge.classList.remove('charging');
                        
                        initialChargeLevel = null;
                        startTime = null;
                        clearInterval(timerInterval);
                        timerInterval = null;

                        deltaValue.style.display = 'none';
                        deltaLabel.style.display = 'none';
                        statsGrid.style.display = 'none';
                        document.getElementById('timerVal').textContent = "00:00";
                        document.getElementById('rateVal').textContent = "0.00";
                        infoText.textContent = "חבר את המטען כדי להתחיל מדידה מלאה.";
                    }
                }

                updateUI();
                renderHistory(); // טעינת היסטוריה קיימת בטעינת העמוד

                battery.addEventListener('chargingchange', updateUI);
                battery.addEventListener('levelchange', updateUI);
            });
        } else {
            document.getElementById('infoText').textContent = "הדפדפן אינו תומך ב-Battery API.";
        }
    </script>
</body>
</html>
